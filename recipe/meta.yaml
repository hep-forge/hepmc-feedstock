{% set name = environ.get('ANACONDA_PACKAGE', "hepmc")|string|lower %}

{% set versions = {
    "3.3.1": "08240160b0f28dc3293aa4d61ce65e2d67cd597acf6faca439f2e46625f7e793"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set version_major = version.split('.')[0] | int %}
{% set root_tag = (root or '')|replace('.', '') %}

build:
  number: 0
  string: "root{{ root_tag }}"
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  {% if version_major < 3 %}
  url: https://gitlab.cern.ch/hepmc/HepMC/-/archive/{{ version }}/HepMC-{{ version }}.tar.gz
  {% else %}
  url: https://gitlab.cern.ch/hepmc/HepMC3/-/archive/{{ version }}/HepMC3-{{ version }}.tar.gz
  {% endif %}
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}
  folder: source
  patches:
    {% if version_major >= 3 %}
    # c.f. https://gitlab.cern.ch/hepmc/HepMC3/-/merge_requests/360
    - patches/readlink-macOS.patch  # [osx]
    - patches/pythia6.patch
    - patches/python3-fix.patch
    # rootIO/CMakeLists.txt appends ${ROOT_INCLUDE_DIRS} to
    # HepMC3rootIO's PUBLIC include dirs with no $<BUILD_INTERFACE:...>
    # guard (unlike the three entries right above it) -- root is listed
    # in both build: and host: here (rootcling needs a native ROOT), so
    # ROOTSYS/ROOT_INCLUDE_DIRS resolves to BUILD_PREFIX at configure
    # time, and that transient path gets baked permanently into the
    # installed HepMC3rootIOTargets.cmake. Every downstream consumer of
    # HepMC3::rootIO (afterburner, hepmc-merger, eventually EICrecon)
    # then fails to configure once BUILD_PREFIX is gone.
    - patches/rootio-relocatable-include.patch
    {% endif %}

requirements:
  build:
    - python
    - root {{ root }}.*
    - cmake<4
    - make
  host:
    - root {{ root }}.*
    - zlib
    - bzip2
    - zstd
    - xz
    - pythia>=8.3
  run:
    - root {{ root }}.*
    - pythia>=8.3

{% if version_major >= 3 %}
test:
  source_files:
    - source/test
  requires:
    - root {{ root }}.*
  commands:

    - HepMC3-config --prefix
    - HepMC3-config --cxxflags
    - HepMC3-config --ldflags
    - HepMC3-config --libdir

    - cd source/test
    - ${CXX} -std=c++11 testMass.cc -o testMass $(HepMC3-config --cxxflags --ldflags) -Wl,-rpath,"$(HepMC3-config --libdir)"
    - ./testMass
{% endif %}

about:
  home: https://hepmc.web.cern.ch/hepmc/
  license: GPL-3.0-or-later
  license_file: source/COPYING
  summary: HepMC3 is a new rewrite of HepMC event record.
  description: |
    HepMC3 is a new rewrite of HepMC event record. It uses shared pointers
    for in-memory navigation and the POD concept for the persistency.
  dev_url: https://gitlab.cern.ch/hepmc/HepMC3

extra:
  recipe-maintainers:
    - meiyasan
